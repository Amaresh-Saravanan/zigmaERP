services:
  backend:
    build: ./backend
    ports: ['8000:8000']
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      MONGODB_URI: ${MONGODB_URI}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}

  frontend:
    build: ./frontend
    ports: ['3000:80']
    depends_on:
      - backend
