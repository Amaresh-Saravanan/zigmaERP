services:
  db:
    image: mariadb:11.8.6
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-zigma_erp_dev}
      MARIADB_USER: ${DB_USER:-zigma}
      MARIADB_PASSWORD: ${DB_PASSWORD:-zigma}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-zigma}
    ports: ['3306:3306']
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports: ['8000:8000']
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      DB_NAME: ${DB_NAME:-zigma_erp_dev}
      DB_USER: ${DB_USER:-zigma}
      DB_PASSWORD: ${DB_PASSWORD:-zigma}
      DB_HOST: db
      DB_PORT: 3306
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}

  frontend:
    build: ./frontend
    ports: ['3000:80']
    depends_on:
      - backend

volumes:
  mariadb_data:
