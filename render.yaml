services:
  - type: web
    name: zigma-erp-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: zigmaerp-1.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://zigma-erp-249p.vercel.app
      - key: MONGODB_URI
        sync: false
